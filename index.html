<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema de Cautela</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
<h2>Login</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>
</div>

<div id="sistema" style="display:none">

<div class="cabecalho">
<img src="brasao.png" alt="Brasão 3º GAC AP">
<h1>Sistema de Cautela</h1>
</div>

<h2>Militares</h2>

<input id="militarNome" placeholder="Nome">

<button onclick="cadastrarMilitar()">
Cadastrar Militar
</button>

<input
id="pesquisaMilitar"
placeholder="Pesquisar Militar"
onkeyup="filtrarMilitares()">

<ul id="listaMilitares"></ul>
  
<ul id="listaMilitares"></ul>

<hr>

<h2>Materiais</h2>

<input id="materialNome" placeholder="Material">
<input id="materialQtd" type="number" placeholder="Quantidade">

<button onclick="cadastrarMaterial()">
Cadastrar Material
</button>

<input
id="pesquisaMaterial"
placeholder="Pesquisar Material"
onkeyup="filtrarMateriais()">

<ul id="listaMateriais"></ul>
  
<ul id="listaMateriais"></ul>

<hr>

<h2>Nova Cautela</h2>

<select id="militarSelect"></select>

<select id="materialSelect"></select>

<input id="qtdCautela"
type="number"
placeholder="Quantidade">

<button onclick="gerarCautela()">
Gerar Cautela
</button>

  <button onclick="gerarPdfUltimaCautela()">
Gerar PDF
</button>

<input
id="pesquisaCautela"
placeholder="Pesquisar Cautela"
onkeyup="filtrarCautelas()">

<ul id="listaCautelas"></ul>
  
<ul id="listaCautelas"></ul>

</div>

<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  
<script type="module" src="firebase.js"></script>
<script src="script.js?v=999"></script>

</body>
</html>
